identity:
  name: search_dashboards
  author: nise-ua
  icon: icon.svg
  icon: icon.svg
  label:
    en_US: Search Dashboards
  description:
    human:
      en_US: Search for dashboards by title, tags, or starred status.
    llm: Search for dashboards in Grafana. Supports filtering by query string, tags, and starred status.
extra:
  python:
    source: tools/search_dashboards.py
parameters:
  - name: query
    type: string
    label:
      en_US: Query
    required: false
    form: form
  - name: tag
    type: string
    label:
      en_US: Tags (comma separated)
    required: false
    form: form
  - name: starred
    type: boolean
    label:
      en_US: Starred
    required: false
    form: form
  - name: limit
    type: number
    label:
      en_US: Limit
    required: false
    form: form
